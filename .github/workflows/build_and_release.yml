name: Build (and release) Flutter Desktop Apps

on:
  push:
    branches: [ main ]

  pull_request:
    paths:
      - lib/**
      - linux/**
      - windows/**
      - macos/**
      - .github/workflows/build.yml

  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update

          # For FastForge
          sudo apt-get install locate
          wget -O appimagetool "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mv appimagetool /usr/local/bin/

          # install fastforge
          dart pub global activate fastforge

          # For tray_manager
          sudo apt-get install libayatana-appindicator3-dev

      - name: flutter pub get
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload snap
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

      - name: Build AppImage
        run: fastforge package --platform linux --targets appimage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "dist/**/*.AppImage"
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install fastforge
        run: dart pub global activate fastforge

      - name: Create MSIX package
        run: fastforge package --platform windows --targets msix

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix
          path: dist\**\*.msix
          if-no-files-found: error

      - name: Create Inno Setup EXE
        run: fastforge package --platform windows --targets exe

      - name: Upload Inno Setup EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist\**\*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run pod install
        working-directory: macos
        run: pod install --repo-update

      - name: Build macOS app
        run: flutter build macos --release

      - name: Create DMG
        run: |
          create-dmg \
            'build/macos/Build/Products/Release/scrcpy buddy.app' \
            --no-code-sign

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: "*.dmg"
          if-no-files-found: error

  publish_release:
    name: Publish Release & Update Brew
    needs: [ build-linux, build-windows, build-macos ]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if Release is Needed
        id: check_release
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | awk '{print $2}' | cut -d '+' -f 1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if git show-ref --tags "v$VERSION" --quiet; then
            echo "Tag v$VERSION already exists. Skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag v$VERSION does not exist. Proceeding with release."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git Tag
        if: steps.check_release.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      - name: Download Artifacts
        if: steps.check_release.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Extract Release Notes
        if: steps.check_release.outputs.skip == 'false'
        run: |
          awk '/^# v/{if (p) exit; p=1; next} p' CHANGELOG.md > release_notes.txt
          echo "NOTES_FILE=release_notes.txt" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: steps.check_release.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ env.VERSION }}" \
            --title "scrcpy buddy v${{ env.VERSION }}" \
            --notes-file ${{ env.NOTES_FILE }} \
            artifacts/*/* || echo "Release already exists"

      - name: Update Homebrew Cask
        if: steps.check_release.outputs.skip == 'false'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          DMG_FILE=$(find artifacts -name "*.dmg" | head -n 1)
          if [ -z "$DMG_FILE" ]; then
            echo "DMG file not found!"
            exit 1
          fi

          SHA256=$(sha256sum "$DMG_FILE" | awk '{print $1}')
          echo "SHA256 for DMG: $SHA256"

          if [ -z "$PAT" ]; then
            echo "PAT secret is missing. Cannot update Homebrew tap."
            exit 1
          fi

          git clone https://x-access-token:${PAT}@github.com/Codertainment/homebrew-scrcpy_buddy.git tap
          cd tap

          sed -i -E "s/version \".*\"/version \"${{ env.VERSION }}\"/" Casks/scrcpy_buddy.rb
          sed -i -E "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/scrcpy_buddy.rb

          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git commit -am "chore: update scrcpy_buddy to v${{ env.VERSION }}"
          git push
